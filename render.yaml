services:
  - type: web
    name: nexus-frontend
    env: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: ${backend.url}
    routes:
      - path: /
    staticPublishPath: frontend/.next

  - type: web
    name: nexus-backend
    env: python
    pythonVersion: 3.12
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexus_db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nexus-cache
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
    routes:
      - path: /api

  - type: pserv
    name: nexus-cache
    env: docker
    repo: https://github.com/render-examples/redis
    autoDeploy: false

databases:
  - name: nexus_db
    engine: postgres
    version: "16"
    initialDatabase: nexus_wellness
    user: nexus_user
    envVars:
      - key: DATABASE_URL
